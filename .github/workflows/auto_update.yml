name: Diesel Price Auto Update

on:
  schedule:
    # Spustí se každé pondělí v 10:00 UTC
    - cron: '0 10 * * 1'
  workflow_dispatch: # Umožní ti spustit skript ručně tlačítkem na GitHubu

jobs:
  update_data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install pandas requests

      - name: Run update script
        run: python Lekce_6_cviceni/main.py
        # Pokud máš jinou cestu k main.py, uprav ji zde

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add Lekce_6_cviceni/ceny_nafty_cr.csv
          git commit -m "Automatická aktualizace cen nafty" || exit 0
          git push